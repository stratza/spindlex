name: GitHub Clone Count Update Everyday

on:
  schedule:
    - cron: "0 0 * * *"      # Once per day at midnight UTC
  workflow_dispatch:

jobs:
  update-clone-count:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GitHub CLI
        run: echo "${{ secrets.SECRET_TOKEN }}" | gh auth login --with-token

      - name: Get current clone count from GitHub API
        run: |
          curl -L --user "${{ github.actor }}:${{ secrets.SECRET_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/traffic/clones \
            -o clone.json

      - name: Setup previous count (create gist if needed)
        id: gist
        run: |
          GIST_ID="${{ secrets.GIST_ID }}"

          if [ -n "$GIST_ID" ]; then
            echo "Using existing GIST_ID: $GIST_ID"
            curl -s -L "https://gist.githubusercontent.com/${{ github.actor }}/$GIST_ID/raw/clone.json" \
              -o clone_before.json || true
          else
            echo "No GIST_ID found. Will create new gist."
            touch clone_before.json
          fi

          # If previous file is empty or not valid JSON, treat as first run
          if [ ! -s clone_before.json ] || ! jq empty clone_before.json 2>/dev/null; then
            echo "No valid previous data. Treating as first run."
            cp clone.json clone_before.json
          fi

          echo "GIST=$GIST_ID" >> $GITHUB_OUTPUT

      - name: Update clone count using MShawon's script
        run: |
          curl -s https://raw.githubusercontent.com/MShawon/github-clone-count-badge/master/main.py -o main.py
          python3 main.py

      - name: Create or update Gist with new data
        env:
          GIST_ID: ${{ secrets.GIST_ID || steps.gist.outputs.GIST }}
        run: |
          if [ -z "${{ secrets.GIST_ID }}" ]; then
            # First time - create gist and save ID as secret
            gist_id=$(gh gist create --public clone.json | awk -F/ '{print $NF}')
            echo $gist_id | gh secret set GIST_ID
            echo "Created new gist: $gist_id"
          else
            # Update existing gist
            content=$(jq -Rs . < clone.json)
            jq -n --arg content "$content" \
              '{description: "${{ github.repository }} clone statistics", files: {clone.json: {content: $content}}}' \
              | curl -s -X PATCH \
                --user "${{ github.actor }}:${{ secrets.SECRET_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d @- "https://api.github.com/gists/${{ secrets.GIST_ID }}" > /dev/null
            echo "Updated existing gist"
          fi

      - name: Update CLONE.md badge (optional)
        run: |
          if [ ! -f CLONE.md ]; then
            cat > CLONE.md << 'EOF'
### GitHub Clone Count

[![GitHub Clones](https://img.shields.io/badge/dynamic/json?color=success&label=Clones&query=count&url=https://gist.githubusercontent.com/${{ github.actor }}/${{ secrets.GIST_ID }}/raw/clone.json&logo=github)](https://github.com/MShawon/github-clone-count-badge)
EOF
            git add CLONE.md
            git commit -m "Add clone count badge" || echo "No changes"
            git push
          fi
