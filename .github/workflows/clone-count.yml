name: GitHub Clone Count Update Everyday

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-clone-count:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GitHub CLI
        run: echo "${{ secrets.SECRET_TOKEN }}" | gh auth login --with-token

      - name: Get today's clone count
        run: |
          curl -L --user "${{ github.actor }}:${{ secrets.SECRET_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/traffic/clones \
            -o today.json

      - name: Prepare previous data
        run: |
          # If clone-stats.json exists, use it as previous; otherwise create empty
          if [ -f clone-stats.json ]; then
            cp clone-stats.json clone_before.json
          else
            echo '{"count": 0, "unique": 0, "clones": []}' > clone_before.json
          fi

      - name: Merge counts using MShawon's script
        run: |
          curl -s https://raw.githubusercontent.com/MShawon/github-clone-count-badge/master/main.py -o main.py
          python3 main.py

      - name: Save updated stats as clone-stats.json
        run: |
          # The script should have created/updated clone.json - rename it to our stats file
          if [ -f clone.json ]; then
            mv clone.json clone-stats.json
          else
            echo "Error: clone.json not generated by script"
            exit 1
          fi

      - name: Commit and push updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add clone-stats.json
          
          if git diff --staged --quiet; then
            echo "No changes in clone count"
          else
            git commit -m "Update clone statistics"
            git push
            echo "✅ clone-stats.json updated and pushed"
          fi
