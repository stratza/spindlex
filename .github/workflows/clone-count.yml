name: GitHub Clone Count Update Everyday

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-clone-count:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GitHub CLI
        run: echo "${{ secrets.SECRET_TOKEN }}" | gh auth login --with-token

      - name: Get today's clone data from GitHub API
        run: |
          curl -L --user "${{ github.actor }}:${{ secrets.SECRET_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/traffic/clones \
            -o clone.json

      - name: Prepare previous data
        run: |
          if [ -f clone-stats.json ]; then
            cp clone-stats.json clone_before.json
            echo "Using previous data from clone-stats.json"
          else
            echo '{"count":0,"uniques":0,"clones":[]}' > clone_before.json
            echo "No previous data found → starting fresh"
          fi

      - name: Merge today's data with previous using MShawon's script
        run: |
          curl -s https://raw.githubusercontent.com/MShawon/github-clone-count-badge/master/main.py -o main.py
          python3 main.py

      - name: Save updated stats
        run: |
          mv clone.json clone-stats.json
          echo "Updated clone-stats.json with cumulative count"

      - name: Commit and push updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add clone-stats.json
          
          if git diff --staged --quiet; then
            echo "No change in clone count today"
          else
            git commit -m "chore: update clone statistics"
            git push
            echo "✅ clone-stats.json updated and pushed successfully"
          fi
