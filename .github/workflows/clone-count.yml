name: Update GitHub Clone Count

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get today's clone data
        run: |
          curl -L --user "${{ github.actor }}:${{ secrets.SECRET_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/traffic/clones \
            -o today.json

      - name: Merge with previous data and save
        run: |
          python3 - << 'EOF'
          import json
          import os
          
          # Load today's data
          with open('today.json') as f:
              today = json.load(f)
          
          # Load previous stats or start fresh
          if os.path.exists('clone-stats.json'):
              with open('clone-stats.json') as f:
                  stats = json.load(f)
          else:
              stats = {"count": 0, "uniques": 0, "clones": []}
          
          # Simple merge: add new daily entries
          for day in today.get('clones', []):
              # Avoid duplicates by timestamp
              if not any(d['timestamp'] == day['timestamp'] for d in stats['clones']):
                  stats['clones'].append(day)
          
          # Recalculate totals
          stats['count'] = sum(int(d['count']) for d in stats['clones'])
          stats['uniques'] = sum(int(d['uniques']) for d in stats['clones'])
          
          # Save updated file
          with open('clone-stats.json', 'w') as f:
              json.dump(stats, f, indent=2)
          
          print("Updated clone-stats.json")
          print(f"Total clones: {stats['count']}")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add clone-stats.json
          
          if git diff --staged --quiet; then
            echo "No change in clone count today"
          else
            git commit -m "chore: update clone statistics"
            git push https://${{ github.actor }}:${{ secrets.SECRET_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
            echo "✅ clone-stats.json updated and pushed"
          fi
