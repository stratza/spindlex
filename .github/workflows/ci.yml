name: Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'CITATION.cff'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- 1. Static Analysis & Linting ---
  ruff:
    name: Lint & Format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - run: uv pip install --system ruff
      - run: ruff check spindlex/ tests/
      - run: ruff format --check spindlex/ tests/

  mypy:
    name: Type Check (Mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - run: uv pip install --system ".[dev]"
      - run: mypy spindlex/

  security:
    name: Security Scan (Bandit/Safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - run: uv pip install --system --upgrade wheel; uv pip install --system bandit 'safety<3.0'
      - run: bandit -r spindlex/ -ll
      - run: safety check

  # --- 2. Unit Tests (no Docker) ---
  unit-tests:
    name: Unit Tests (Py 3.11)
    needs: [ruff]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - run: uv pip install --system -e ".[test]"
      - run: pytest tests/ -m "not integration and not real_server and not slow and not performance" --timeout=120 --cov=spindlex --cov-report=xml
      - name: Upload unit test coverage
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: ./coverage.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

  # --- 3. Documentation ---
  docs-build:
    name: Verify Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - run: uv pip install --system ".[docs]"
      - run: mkdocs build --strict

  # --- 4. Final Verification ---
  check:
    name: Quality Gate
    if: always()
    needs: [ruff, mypy, security, unit-tests, docs-build]
    runs-on: ubuntu-latest
    steps:
      - name: Result
        run: |
          if [ "${{ needs.ruff.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.mypy.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.security.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.docs-build.result }}" != "success" ]; then exit 1; fi
          echo "All checks passed!"
