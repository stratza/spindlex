name: Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'CITATION.cff'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- 1. Static Analysis & Linting ---
  ruff:
    name: Lint & Format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv pip install --system ruff
      - run: ruff check spindlex/ tests/
      - run: ruff format --check spindlex/ tests/

  mypy:
    name: Type Check (Mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv pip install --system ".[dev]"
      - run: mypy spindlex/

  security:
    name: Security Scan (Bandit/Safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv pip install --system --upgrade wheel; uv pip install --system bandit 'safety<3.0'
      - run: bandit -r spindlex/ -ll
      - run: safety check

  # --- 2. Unit Tests (no Docker) ---
  unit-tests:
    name: Unit Tests (Py ${{ matrix.python-version }})
    needs: [ruff]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install --system -e ".[test]"
      - run: pytest tests/ -v -m "not integration and not real_server" --cov=spindlex --cov-report=xml
      - name: Upload unit test coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

  # --- 3. Docker-based Tests (integration + real_server share one container) ---
  docker-tests:
    name: Docker Tests (OpenSSH + Dropbear)
    needs: [ruff]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv pip install --system -e ".[test]" pytest-docker pytest-timeout
      - name: Run integration + real_server suites
        run: |
          pytest tests/integration/ tests/real_server/ tests/misc/test_functional_integration.py \
            -v -m "integration or real_server" \
            --tb=short \
            --timeout=120 \
            --cov=spindlex \
            --cov-report=xml
      - name: Upload integration coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}

  # --- 4. Documentation ---
  docs-build:
    name: Verify Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv pip install --system ".[docs]"
      - run: mkdocs build --strict

  # --- 5. Final Verification ---
  check:
    name: Quality Gate
    if: always()
    needs: [ruff, mypy, security, unit-tests, docker-tests, docs-build]
    runs-on: ubuntu-latest
    steps:
      - name: Result
        run: |
          if [ "${{ needs.ruff.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.mypy.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.security.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.docker-tests.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.docs-build.result }}" != "success" ]; then exit 1; fi
          echo "All checks passed!"
