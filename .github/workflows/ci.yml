name: Pipeline

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'CITATION.cff'
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- 1. Static Analysis & Linting ---
  ruff:
    name: Lint & Format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv pip install --system ruff
      - run: ruff check spindlex/ tests/
      - run: ruff format --check spindlex/ tests/

  mypy:
    name: Type Check (Mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv pip install --system ".[dev]"
      - run: mypy spindlex/

  security:
    name: Security Scan (Bandit/Safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv pip install --system bandit safety
      - run: bandit -r spindlex/ -ll
      - run: safety check

  # --- 2. Advanced Testing Tiers ---
  unit-tests:
    name: Unit Tests (Py ${{ matrix.python-version }})
    needs: [ruff] # Don't waste compute if code isn't even formatted
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install --system -e ".[test]"
      - run: pytest tests/ -v -m "not integration and not real_server" --cov=spindlex --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration (OpenSSH Docker)
    needs: [ruff]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Integration Suite
        run: |
          uv pip install --system -e ".[test]" pytest-docker
          pytest tests/integration/ -v

  real-server-tests:
    name: Real Server Tests (OpenSSH Docker)
    needs: [ruff]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Real Server Test Suite
        run: |
          uv pip install --system -e ".[test]" pytest-docker
          pytest tests/real_server/ -v -m "real_server"

  # --- 3. Documentation & Quality ---
  docs-build:
    name: Verify Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: uv pip install --system ".[docs]"
      - run: mkdocs build --strict

  # --- 4. Final Verification ---
  check:
    name: Quality Gate
    if: always()
    needs: [ruff, mypy, security, unit-tests, integration-tests, real-server-tests, docs-build]
    runs-on: ubuntu-latest
    steps:
      - name: Result
        run: |
          if [ "${{ needs.ruff.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.mypy.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.security.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.real-server-tests.result }}" != "success" ]; then exit 1; fi
          if [ "${{ needs.docs-build.result }}" != "success" ]; then exit 1; fi
          echo "All checks passed!"
