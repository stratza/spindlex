name: Integration

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "spindlex/**"
      - "tests/**"
      - "scripts/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "pyproject.toml"
      - ".github/workflows/ci-matrix.yml"
      - ".github/workflows/integration.yml"
      - ".github/workflows/release.yml"
  push:
    branches: [main]
    paths:
      - "spindlex/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/ci-matrix.yml"
      - ".github/workflows/integration.yml"
      - ".github/workflows/release.yml"
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:
  workflow_call:
    inputs:
      track_failures:
        description: "Track standalone integration failures with deduplicated issues."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-protocol:
    name: Docker OpenSSH and Dropbear
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: uv pip install --system -e ".[test]" pytest-docker pytest-timeout
      - name: Run Docker integration suite
        run: |
          pytest tests/integration/ tests/real_server/ tests/misc/test_functional_integration.py \
            -m "integration or real_server" \
            --tb=short \
            --timeout=120 \
            --timeout-method=thread \
            --cov=spindlex \
            --cov-report=xml
      - name: Upload integration coverage
        if: github.event_name != 'workflow_call'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: ./coverage.xml
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}

  failure-tracking:
    name: Integration failure tracking
    needs: docker-protocol
    if: >
      always() &&
      github.event_name != 'pull_request' &&
      (github.event_name != 'workflow_call' || inputs.track_failures) &&
      needs.docker-protocol.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Track repeated integration failures
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python scripts/track_workflow_failure.py ci \
            --repository "${{ github.repository }}" \
            --token "$GITHUB_TOKEN" \
            --workflow-name "${{ github.workflow }}" \
            --workflow-file "integration.yml" \
            --run-id "${{ github.run_id }}" \
            --run-url "$RUN_URL" \
            --branch "${{ github.ref_name }}" \
            --source-sha "${{ github.sha }}" \
            --event-name "${{ github.event_name }}" \
            --failed-stage "docker-protocol"
