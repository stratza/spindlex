name: Compatibility Matrix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "spindlex/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/ci-matrix.yml"
      - ".github/workflows/integration.yml"
      - ".github/workflows/release.yml"
  push:
    branches: [main]
    paths:
      - "spindlex/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/ci-matrix.yml"
      - ".github/workflows/integration.yml"
      - ".github/workflows/release.yml"
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: compatibility-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-matrix:
    name: Ubuntu Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install --system -e ".[test]"
      - name: Run unit compatibility suite
        run: |
          pytest tests/ \
            -m "not integration and not real_server and not slow and not performance" \
            --timeout=120 \
            --timeout-method=thread \
            --cov=spindlex \
            --cov-report=xml
      - name: Upload unit coverage
        if: matrix.python-version == '3.11' && github.event_name != 'workflow_call'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: ./coverage.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
