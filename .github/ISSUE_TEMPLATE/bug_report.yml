name: 🐛 Bug Report
description: Report a bug to help us improve SpindleX
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: |
        How can we reproduce the bug?
        Please provide a minimal code example or steps to reproduce.
      placeholder: |
        1. Install SpindleX version X.Y.Z
        2. Run this script...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Please provide any relevant logs or stack traces.
        Tip: You can use triple backticks to format code.
      render: python
  - type: dropdown
    id: version
    attributes:
      label: SpindleX Version
      options:
        - Latest (Main)
        - 0.4.x
        - 0.3.x
        - Other (please specify in description)
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: e.g. Ubuntu 22.04, Python 3.11, uv v0.1.0
    validations:
      required: true
