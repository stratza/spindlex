[tox]
envlist = py39,py310,py311,py312,lint,type-check,security
isolated_build = True

[testenv]
deps = 
    pytest>=7.0.0
    pytest-cov>=4.0.0
    pytest-asyncio>=0.21.0
commands = 
    pytest tests/ -v --cov=spindlex --cov-report=term --cov-report=xml

[testenv:lint]
deps = 
    black>=23.0.0
    isort>=5.12.0
    flake8>=6.0.0
commands = 
    black --check spindlex tests
    isort --check-only spindlex tests
    flake8 spindlex tests

[testenv:type-check]
deps = 
    mypy>=1.0.0
    types-all
commands = 
    mypy spindlex

[testenv:security]
deps = 
    bandit[toml]>=1.7.5
    safety>=2.3.0
commands = 
    bandit -r spindlex -c pyproject.toml
    safety check

[testenv:docs]
deps = 
    sphinx>=6.0.0
    sphinx-rtd-theme>=1.2.0
    myst-parser>=1.0.0
commands = 
    sphinx-build -W -b html docs docs/_build/html

[testenv:build]
deps = 
    build>=0.10.0
    twine>=4.0.0
commands = 
    python -m build
    twine check dist/*

[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = 
    .git,
    __pycache__,
    build,
    dist,
    .eggs,
    *.egg-info,
    .venv,
    .tox