# Optimized GitLab CI/CD for SpindleX
# Consolidated to reduce noise while maintaining high standards

stages:
  - lint
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "${CI_JOB_NAME}"
  paths:
    - .cache/pip

# Standard Linting using pre-commit
linting:
  stage: lint
  image: python:3.11
  before_script:
    - pip install pre-commit
  script:
    - pre-commit run --all-files

# Fast linting using Ruff
ruff:
  stage: lint
  image: python:3.11
  before_script:
    - pip install ruff
  script:
    - ruff check spindlex/

# Security analysis using Bandit
bandit:
  stage: lint
  image: python:3.11
  before_script:
    - pip install bandit
  script:
    - bandit -r spindlex/ -ll

# Core Test Suite
testing:
  stage: test
  image: python:3.11
  before_script:
    - pip install .[test]
  script:
    - python -m pytest tests/ -v --cov=spindlex --cov-report=term --cov-report=xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week

# Build and Package
build_package:
  stage: build
  image: python:3.11
  only:
    - tags
    - main
  before_script:
    - pip install build twine
  script:
    - python -m build
    - twine check dist/*
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# Optional: Automatic deployment to PyPI on tags
deploy_pypi:
  stage: deploy
  image: python:3.11
  only:
    - tags
  script:
    - pip install twine
    - twine upload dist/*
  variables:
    TWINE_USERNAME: $PYPI_USERNAME
    TWINE_PASSWORD: $PYPI_PASSWORD
